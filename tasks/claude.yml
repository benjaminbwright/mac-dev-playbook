---
# Preload global Claude Code config from the PRIVATE dotfiles repo into ~/.claude.
# Source: the cloned dotfiles repo (dotfiles_repo_local_destination/claude).
#
# Settings files are SEEDED (force: false — don't clobber a machine's live
# settings). Skills are MERGED with rsync --ignore-existing: missing skills are
# added, existing ones (incl. this machine's symlinks) are left untouched.

- name: Resolve Claude config source (in the cloned dotfiles repo).
  ansible.builtin.set_fact:
    claude_src: "{{ dotfiles_repo_local_destination | expanduser }}/claude"

- name: Check the Claude config snapshot is present.
  ansible.builtin.stat:
    path: "{{ claude_src }}/skills"
  register: claude_src_stat

- name: Warn if the Claude snapshot is missing.
  ansible.builtin.debug:
    msg: >-
      Claude config snapshot not found at {{ claude_src }}. Pull the dotfiles repo
      (git -C {{ dotfiles_repo_local_destination }} pull) so claude/ is present,
      then re-run with --tags claude.
  when: not claude_src_stat.stat.exists

- name: Preload Claude config.
  when: claude_src_stat.stat.exists
  block:
    - name: Ensure ~/.claude exists.
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.claude"
        state: directory

    - name: Seed Claude settings files (only if not already present).
      ansible.builtin.copy:
        src: "{{ claude_src }}/{{ item.name }}"
        dest: "{{ ansible_env.HOME }}/.claude/{{ item.name }}"
        remote_src: true
        force: false
        mode: "{{ item.mode | default(omit) }}"
      loop:
        - { name: "settings.json" }
        - { name: "settings.local.json" }
        - { name: "config.json", mode: "0600" }

    - name: Restore Claude skills (adds missing; never clobbers existing).
      ansible.builtin.command:
        cmd: "rsync -ai --ignore-existing {{ claude_src }}/skills/ {{ ansible_env.HOME }}/.claude/skills/"
      register: claude_skills_sync
      changed_when: claude_skills_sync.stdout | trim | length > 0
