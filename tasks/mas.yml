---
# Install Mac App Store apps.
#
# Two facts about modern `mas` (7.x) that this task is built around:
#   1. `mas install` REQUIRES root ("Requires root privileges to install apps"),
#      so the install step runs with become: true.
#   2. Under sudo, /opt/homebrew/bin drops off PATH, so `mas` can't be found by
#      name as root. We call it by ABSOLUTE PATH ({{ mas_bin }}) to avoid that.
# (The geerlingguy.mac.mas role gets #1 right but trips on #2, which is why it
#  failed with "Required `mas` tool is not installed".)
#
# `mas` can only install apps already associated with your Apple ID. Paid apps
# you don't own can't be installed by any tool — buy them once in the App Store.
# We do NOT fail the play when one app can't install; we report it and move on.

- name: Determine the mas binary path (Homebrew differs by CPU arch).
  set_fact:
    mas_bin: "{{ '/opt/homebrew/bin/mas' if ansible_facts.architecture == 'arm64' else '/usr/local/bin/mas' }}"

- name: List apps already installed from the Mac App Store.
  command: "{{ mas_bin }} list"
  register: mas_list
  changed_when: false
  failed_when: mas_list.rc not in [0, 1]

- name: Install configured Mac App Store apps (mas install needs root).
  become: true
  command: "{{ mas_bin }} install {{ item.id | default(item) }}"
  register: mas_install
  changed_when: "'Installed' in (mas_install.stdout | default(''))"
  failed_when: false
  loop: "{{ mas_installed_apps }}"
  loop_control:
    label: "{{ item.name | default(item.id | default(item)) }}"
  when: (item.id | default(item) | string) not in mas_list.stdout

- name: Report Mac App Store apps that could not be installed automatically.
  debug:
    msg: >-
      Could NOT auto-install "{{ item.item.name | default(item.item.id | default(item.item)) }}"
      (rc={{ item.rc }}). If you DO own it, this is usually a transient App Store
      error — re-run. If you don't own it, buy it once in the App Store.
      Detail: {{ (item.stderr | default('')) | trim }}
  loop: "{{ mas_install.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name | default(item.item.id | default(item.item)) }}"
  when:
    - not (item.skipped | default(false))
    - item.rc is defined
    - item.rc != 0
    - "'already installed' not in ((item.stderr | default('')) | lower)"
