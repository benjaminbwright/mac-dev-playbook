---
- hosts: all

  # Ensure Homebrew's bin dir is on PATH for every task. Apple Silicon installs
  # brew to /opt/homebrew/bin, which is NOT on Ansible's default task PATH
  # (/usr/bin:/bin:...). Without this, PATH-based module lookups fail — e.g. the
  # community.general.mas module reports "Required `mas` tool is not installed"
  # even though `mas` is installed. /usr/local/bin covers Intel Macs.
  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:{{ ansible_env.PATH }}"
    # Newer Homebrew requires third-party taps to be "trusted" or it refuses to
    # load their formulae AND exits non-zero on every `brew install` — which makes
    # the Ansible homebrew module mark nearly everything as failed, and hard-fails
    # tap-sourced formulae like mongodb-community. We declare these taps ourselves
    # (hashicorp/tap, bufbuild/buf, mongodb/brew, github/gh), so disable the trust
    # gate. This is Homebrew's documented escape hatch; if a future Homebrew removes
    # it, switch to `brew trust <tap>` for each tap instead.
    HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"

  vars_files:
    - default.config.yml

  pre_tasks:
    - name: Include playbook configuration.
      include_vars: "{{ item }}"
      with_fileglob:
        - "{{ playbook_dir }}/config.yml"
      tags: ['always']

    # The dock role installs dockutil via the community.general.homebrew module,
    # which fails on current Homebrew (brew install exits non-zero even on
    # success). Install it here tolerantly BEFORE the dock role, and set
    # dockutil_install: false on that role. Success/failure is keyed on brew's
    # 'Error:' string, not its exit code (which is unreliable on this Homebrew).
    - name: Ensure dockutil is installed (tolerant; dock role's installer is disabled).
      ansible.builtin.command:
        cmd: "/opt/homebrew/bin/brew install dockutil"
      register: dockutil_result
      changed_when: >-
        'already installed' not in (dockutil_result.stdout | default('')) and
        'already installed' not in (dockutil_result.stderr | default(''))
      failed_when: >-
        'Error:' in (dockutil_result.stdout | default('')) or
        'Error:' in (dockutil_result.stderr | default(''))
      when: configure_dock | default(false)
      tags: ['dock', 'homebrew']

  roles:
    - role: elliotweiser.osx-command-line-tools
    - role: geerlingguy.mac.homebrew
      # Skip the role's per-package formula loop: its homebrew module mis-detects
      # already-installed packages on current Homebrew and then fails on brew's
      # "already installed" notice. We install formulae ourselves in tasks: below
      # (tolerant + idempotent). The role still installs taps and casks.
      homebrew_installed_packages: []
      tags: ['homebrew']
    - role: geerlingguy.dotfiles
      when: configure_dotfiles
      tags: ['dotfiles']
    # NOTE: geerlingguy.mac.mas (5.0.0) is disabled. mas 7.x REQUIRES root to
    # install apps, but under sudo /opt/homebrew/bin leaves PATH, so the role's
    # mas module can't find the `mas` binary ("Required `mas` tool is not
    # installed"). We install MAS apps ourselves in tasks/mas.yml using become +
    # an absolute path to mas, which sidesteps that. Re-enable only if fixed.
    # - role: geerlingguy.mac.mas
    #   when: mas_installed_apps or mas_installed_app_ids
    #   tags: ['mas']
    - role: geerlingguy.mac.dock
      # dockutil is installed in pre_tasks (the role's own installer uses the
      # homebrew module, which fails on current Homebrew).
      dockutil_install: false
      when: configure_dock
      tags: ['dock']

  tasks:
    # Install Homebrew formulae ourselves rather than via the homebrew role's
    # per-package module loop. On current Homebrew that module mis-detects
    # already-installed packages and then treats brew's "already installed"
    # notice as a failure, so re-runs fail noisily. `brew install` is itself
    # idempotent, so we just run it and treat "already installed" as unchanged.
    # `brew install` is idempotent, but on current Homebrew it exits NON-ZERO even
    # on success (and on "already installed"), so we can't trust rc. Key failure on
    # brew's 'Error:' prefix instead, and treat "already installed" as unchanged.
    - name: Install configured Homebrew formulae (idempotent, tolerant).
      ansible.builtin.command:
        cmd: "/opt/homebrew/bin/brew install {{ item.name | default(item) }}"
      register: brew_formula
      changed_when: >-
        'already installed' not in (brew_formula.stdout | default('')) and
        'already installed' not in (brew_formula.stderr | default(''))
      failed_when: >-
        'Error:' in (brew_formula.stdout | default('')) or
        'Error:' in (brew_formula.stderr | default(''))
      loop: "{{ homebrew_installed_packages }}"
      loop_control:
        label: "{{ item.name | default(item) }}"
      tags: ['homebrew']

    - import_tasks: tasks/sudoers.yml
      when: configure_sudoers
      tags: ['sudoers']

    - import_tasks: tasks/terminal.yml
      when: configure_terminal
      tags: ['terminal']

    - import_tasks: tasks/osx.yml
      when: configure_osx
      tags: ['osx']

    - import_tasks: tasks/extra-packages.yml
      tags: ['extra-packages']

    - import_tasks: tasks/mas.yml
      when: mas_installed_apps | length > 0
      tags: ['mas']

    # Clone the private secrets repo (vault-encrypted .env bundle) so it's ready
    # for `make restore`. Foundational, so it's a committed task here rather than
    # relying on the gitignored config.yml manifest. Requires GitHub SSH access.
    - name: Clone the secrets repo.
      ansible.builtin.git:
        repo: git@github.com:benjaminbwright/secrets.git
        dest: "{{ ansible_env.HOME }}/Development/GitHub/secrets"
        update: false
        accept_hostkey: true
      tags: ['repos', 'secrets']

    # Clone personal/work git repos listed in config.yml (git_repositories).
    # The list is gitignored (it leaks repo names), so this no-ops unless config.yml
    # defines it. update: false → clone if missing, never disturb an existing repo.
    # Requires GitHub SSH access on this machine. ignore_errors so one inaccessible
    # repo doesn't abort the rest; check the recap for any that failed.
    - name: Clone configured git repositories.
      ansible.builtin.git:
        repo: "{{ item.repo }}"
        dest: "{{ ansible_env.HOME }}/{{ item.dest }}"
        version: "{{ item.version | default(omit) }}"
        update: false
        accept_hostkey: true
      loop: "{{ git_repositories | default([]) }}"
      loop_control:
        label: "{{ item.dest }}"
      ignore_errors: true
      tags: ['repos']

    - import_tasks: tasks/sublime-text.yml
      when: configure_sublime
      tags: ['sublime-text']

    - import_tasks: tasks/editors.yml
      tags: ['editors']

    - block:
        - name: Run configured post-provision ansible task files.
          include_tasks: "{{ outer_item }}"
          loop_control:
            loop_var: outer_item
          with_fileglob: "{{ post_provision_tasks|default(omit) }}"
      tags: ['post']
    # MySQL Stuff
    # The `pip` Ansible module needs setuptools (pkg_resources) in the target
    # interpreter, which modern Homebrew Python lacks, and PEP 668 blocks naive
    # global installs. Install setuptools + PyMySQL straight into the interpreter
    # Ansible uses for modules, with --break-system-packages. No become: Homebrew's
    # site-packages is user-writable and shared, so the root-run mysql_user module
    # (same interpreter) also finds PyMySQL.
    - name: Ensure setuptools + PyMySQL are available to Ansible's Python (for mysql_* modules).
      ansible.builtin.command:
        cmd: "{{ ansible_python.executable }} -m pip install --break-system-packages --quiet setuptools PyMySQL"
      changed_when: false
      when: ansible_os_family == "Darwin"
    # https://stackoverflow.com/questions/44824650/starting-homebrew-service-in-ansible-not-working
    - name: Start MySQL Service
      command: /opt/homebrew/bin/brew services start mysql
      when: ansible_os_family == "Darwin"
    # Best-effort: a root/root local-dev convenience. On a brand-new MySQL the root
    # account may auth differently, so don't let this block the rest of the run.
    - name: Setup root MySQL user (continues on error).
      become: true
      community.mysql.mysql_user:
        login_user: root
        login_password: root
        login_unix_socket: /tmp/mysql.sock
        name: root
        password: root
        check_implicit_admin: true
      ignore_errors: true
    # MongoDB Stuff
    - name: Start MongoDB Service
      command: /opt/homebrew/bin/brew services start mongodb-community
      when: ansible_os_family == "Darwin"
    # Syncthing — run as a login service so it syncs continuously in the
    # background. Pair it with your local Syncthing server via the web UI at
    # http://localhost:8384 (add the server's Device ID, then share folders).
    - name: Start Syncthing service
      command: /opt/homebrew/bin/brew services start syncthing
      register: syncthing_service
      changed_when: "'already started' not in (syncthing_service.stdout | default(''))"
      when: ansible_os_family == "Darwin"
      tags: ['syncthing']
    # The rustup formula is keg-only on current Homebrew, so `rustup-init` isn't on
    # PATH — call it by its keg path. `creates` makes this idempotent (skips once
    # the toolchain exists); --no-modify-path leaves shell profiles to our dotfiles.
    - name: Initialize Rust toolchain.
      ansible.builtin.command:
        cmd: "/opt/homebrew/opt/rustup/bin/rustup-init -y --no-modify-path"
        creates: "{{ ansible_env.HOME }}/.cargo/bin/rustc"
      when: ansible_os_family == "Darwin"
      ignore_errors: true
