    name: "Xcode"
  - id: 634148309
    name: "Logic Pro"
  - id: 634159523
    name: "MainStage"
  - id: 682658836
    name: "GarageBand"
  - id: 899247664
    name: "TestFlight"
  - id: 585829637
    name: "Todoist"
  - id: 1298450641
    name: "monday.com"
  - id: 1667260533
    name: "Sketch"
  - id: 6469834197
    name: "Roam"
  - id: 6714467650
    name: "Perplexity"
mas_email: ""
mas_password: ""

osx_script: "~/.osx --no-restart"

# Install packages from other package managers.
# Note: You are responsible for making sure the required package managers are
# installed, eg. through homebrew.
composer_packages: []
# - name: drush
#   state: present # present/absent, default: present
#   version: "^8.1" # default: N/A
gem_packages: []
# - name: bundler
#   state: present # present/absent/latest, default: present
#   version: "~> 1.15.1" # default: N/A
npm_packages: []
# - name: webpack
#   state: present # present/absent/latest, default: present
#   version: "^2.6" # default: N/A
pip_packages: []
# - name: mkdocs
#   state: present # present/absent/latest, default: present
#   version: "0.16.3" # default: N/A

# Set to 'true' to configure Sublime Text.
configure_sublime: false
sublime_base_path: "~/Library/Application Support/Sublime Text"
sublime_config_path: "Packages/User"
sublime_package_control:
  - "DocBlockr"
  - "Dockerfile Syntax Highlighting"
  - "FileDiffs"
  - "GitHub Flavored Markdown Preview"
  - "Jinja2"
  - "Package Control"
  - "PHP-Twig"
  - "Pretty JSON"
  - "SublimeLinter"
  - "SublimeLinter-contrib-yamllint"
  - "TrailingSpaces"
  - "WordCount"

# Glob pattern to ansible task files to run after all other tasks are finished.
post_provision_tasks: []

# Mysql role vars
mysql_packages:
  - mysql
  - mysql-server

# python
# Do NOT hardcode /opt/homebrew/bin/python3 here: on a fresh Mac that path does
# not exist until the homebrew role runs, but fact-gathering happens first, so
# the playbook fails at "Gathering Facts" with "no such file or directory".
# 'auto_silent' lets Ansible discover a Python that already exists (and silences
# the discovery warning). Override in config.yml if you need a specific one.
ansible_python_interpreter: auto_silent
