#
# Adobe Creative Cloud (install the CC desktop app first, then each app):
#   - Adobe Creative Cloud .... https://creativecloud.adobe.com/apps/download/creative-cloud
#   - Acrobat (DC)
#   - Audition
#   - Illustrator
#   - Photoshop
#   - Premiere Pro
#   - Media Encoder
#
# Other direct-download / unverified-source apps:
#   - Codex ................... https://persistent.oaistatic.com/sidekick/public/ChatGPT.dmg
#   - Join .................... https://joaoapps.com/join/
#   - GoodMorning ............. (verify source / vendor)
#   - BookWright .............. Blurb book-design tool: https://www.blurb.com/bookwright
