---
downloads: ~/.ansible-downloads/

configure_dotfiles: true
configure_terminal: true
configure_osx: true

# Set to 'true' to configure the Dock via dockutil.
configure_dock: true
dockitems_remove:
  - Launchpad
  - TV
  - Podcasts
  - "App Store"
  - News
  - Mail
  - Contacts
  - Maps
  - Music
  - FaceTime
  - Messages
  - Photos
dockitems_persist:
  - name: "Terminal"
    path: "/Applications/Terminal.app/"
    pos: 1
  - name: "VS Code"
    path: "/Applications/Visual Studio Code.app/"
    pos: 2
  - name: "Obsidian"
    path: "/Applications/Obsidian.app/"
    pos: 3
  - name: "Chrome"
    path: "/Applications/Google Chrome.app/"
    pos: 4

configure_sudoers: false
sudoers_custom_config: ""
# Example:
# sudoers_custom_config: |
#   # Allow users in admin group to use sudo with no password.
#   %admin ALL=(ALL) NOPASSWD: ALL

dotfiles_repo: https://github.com/geerlingguy/dotfiles.git
dotfiles_repo_accept_hostkey: true
dotfiles_repo_local_destination: ~/Development/GitHub/dotfiles
dotfiles_files:
  - .zshrc
  - .gitignore
  - .inputrc
  - .osx
  - .vimrc

homebrew_installed_packages:
  # - ansible # Installed via Pip.
  - autoconf
  - bash-completion
  - doxygen
  - gettext
  - gifsicle
  - git
  - github/gh/gh
  - go
  - gpg
  - httpie
  - iperf
  - libevent
  - sqlite
  - mysql
  - mcrypt
  - mongodb-community
  - nmap
  - node
  - nvm
  - php
  - poetry
  - python
  - ssh-copy-id
  - cowsay
  - readline
  - rustup
  - openssl
  - pv
  - wget
  - wrk
  - zsh-history-substring-search
  - cocoapods
  - pandoc
  - pnpm
  - mysql-client
  # --- Added to mirror current machine (2026-06-16) ---
  # Languages / runtimes / version management
  - pyenv
  - virtualenv
  - python@3.10
  - python@3.11
  - yarn
  - gcc
  # Cloud / infra / kubernetes
  - hashicorp/tap/terraform
  - helm
  - minikube
  - kubeconform
  - golang-migrate
  - doctl
  - railway
  - docker-compose
  # Dev tooling
  - bufbuild/buf/buf
  - xcodegen
  - direnv
  - fswatch
  - rsync
  - graphviz
  - black
  - ruff
  - bats-core
  - pi-coding-agent
  # Databases
  - postgresql@14
  # Media / misc
  - ffmpeg
  - weasyprint
  - cmatrix
  # Mac App Store CLI (used by mas_installed_apps below)
  - mas
  # NOTE: 'ansible' is also installed via Homebrew on the current machine.
  # The playbook itself installs Ansible via pip (see main.yml), so it is left
  # commented to avoid two competing Ansible installs. Uncomment if you prefer brew.
  # - ansible

homebrew_taps:
  # homebrew/core and homebrew/cask are built into Homebrew now — tapping them
  # explicitly errors ("Tapping homebrew/core is no longer typically necessary"),
  # so they are intentionally omitted.
  - mongodb/brew
  - hashicorp/tap
  - bufbuild/buf
  # Present on the current machine but not currently backing a declared package:
  # - heroku/brew
  # - hpedrorodrigues/tools

homebrew_cask_appdir: /Applications
homebrew_cask_apps:
  - chromedriver
  # Container runtime: docker CLI + Docker Desktop (orbstack intentionally omitted).
  # 'docker' cask was renamed upstream to 'docker-desktop'.
  - docker-desktop
  - dropbox
  - firefox
  - google-chrome
  - handbrake
  - handbrake-app
  - licecap
  - sequel-ace
  - slack
  - transmit
  - visual-studio-code
  - obsidian
  - zoom
  # NOTE: the 'mysql-connector-python' cask was removed from Homebrew (deprecated
  # ~2023), so `brew install --cask mysql-connector-python` fails with "No Cask
  # with this name exists". It's a Python library — install it per-project via
  # poetry/pip in a virtualenv (e.g. `pip install mysql-connector-python`), or add
  # it to pip_packages if you really want it global.
  - fantastical
  - freecad
  - balenaetcher
  # --- Added to mirror current machine (2026-06-16) ---
  # Editors / AI / terminal
  - cursor
  - claude
  - claude-code
  - warp
  - wispr-flow
  - chatgpt
  # Dev / DB / API tooling
  - dockutil          # required by the dock-configuration role
  - insomnia
  - pgadmin4
  # Productivity / comms
  - figma
  - asana
  - microsoft-teams
  - microsoft-edge
  - google-drive
  - tailscale
  - logseq
  # Design / CAD / print / media
  - inkscape
  - inkstitch
  - scribus
  - scrivener
  - openoffice
  - topaz-gigapixel-ai
  - vassal

